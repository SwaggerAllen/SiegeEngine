version: "3.8"

services:
  app:
    image: siege-engine:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - siege_data:/data
      - claude_config:/home/claude/.claude
    environment:
      - SIEGE_ANTHROPIC_API_KEY=${SIEGE_ANTHROPIC_API_KEY}
      - SIEGE_JWT_SECRET_KEY=${SIEGE_JWT_SECRET_KEY}
      - SIEGE_CORS_ORIGINS=${SIEGE_CORS_ORIGINS}
      - SIEGE_DATABASE_URL=sqlite:////data/siege_engine.db
      - SIEGE_GIT_REPOS_BASE_PATH=/data/repos
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SIEGE_DOMAIN=${SIEGE_DOMAIN:-localhost}
    depends_on:
      - app

volumes:
  siege_data:
    external: true
  claude_config:
  caddy_data:
  caddy_config:
