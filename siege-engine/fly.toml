app = "siege-engine"
primary_region = "iad"

[build]

[env]
  SIEGE_DATABASE_URL = "sqlite:////data/siege_engine.db"
  SIEGE_GIT_REPOS_BASE_PATH = "/data/repos"
  SIEGE_CORS_ORIGINS = '["https://siege-engine.fly.dev"]'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "siege_data"
  destination = "/data"
