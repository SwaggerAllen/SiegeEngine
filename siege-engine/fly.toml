# fly.toml app configuration file generated for siege-engine on 2026-03-11T04:52:52Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'siege-engine'
primary_region = 'sjc'

[build]

[deploy]
  strategy = 'immediate'

[env]
  SIEGE_CORS_ORIGINS = '["https://siege-engine.fly.dev"]'
  SIEGE_DATABASE_URL = 'sqlite:////data/siege_engine.db'
  SIEGE_GIT_REPOS_BASE_PATH = '/data/repos'

[[mounts]]
  source = 'siege_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1
  count = 1
