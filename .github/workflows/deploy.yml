name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy repo to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "siege-engine/"
          target: /tmp/siege-deploy

      - name: Build and deploy on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /tmp/siege-deploy/siege-engine
            echo "=== Deploy: building commit $(git rev-parse --short HEAD) ==="
            echo "=== Files check: $(head -1 backend/pipeline/summarize.py) ==="
            docker build --build-arg COMMIT_HASH=$(git rev-parse --short HEAD) -t siege-engine:latest .

            # Write .env for docker-compose
            printf '%s\n' \
              "SIEGE_ANTHROPIC_API_KEY=${{ secrets.SIEGE_ANTHROPIC_API_KEY }}" \
              "SIEGE_JWT_SECRET_KEY=${{ secrets.SIEGE_JWT_SECRET_KEY }}" \
              "SIEGE_DOMAIN=${{ secrets.SIEGE_DOMAIN }}" \
              'SIEGE_CORS_ORIGINS=["https://${{ secrets.SIEGE_DOMAIN }}"]' \
              > .env

            # Stop old standalone container if it exists (migration from pre-compose setup)
            docker stop siege-engine 2>/dev/null || true
            docker rm siege-engine 2>/dev/null || true

            # Deploy with docker-compose
            docker compose down || true
            docker compose up -d

            docker image prune -f
            rm -rf /tmp/siege-deploy
