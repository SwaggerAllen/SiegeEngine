name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy repo to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "siege-engine/"
          target: /tmp/siege-deploy

      - name: Build and deploy on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /tmp/siege-deploy/siege-engine
            COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "$GITHUB_SHA" | cut -c1-7)
            echo "=== Deploy: building commit $COMMIT_HASH ==="
            docker build --build-arg COMMIT_HASH=$COMMIT_HASH -t siege-engine:latest .
            docker stop siege-engine || true
            docker rm siege-engine || true
            docker run -d \
              --name siege-engine \
              --restart=unless-stopped \
              --log-driver json-file \
              --log-opt max-size=50m \
              --log-opt max-file=5 \
              -p 80:8000 \
              -v siege_data:/data \
              -v claude_config:/home/claude/.claude \
              -e SIEGE_ANTHROPIC_API_KEY=${{ secrets.SIEGE_ANTHROPIC_API_KEY }} \
              -e SIEGE_JWT_SECRET_KEY=${{ secrets.SIEGE_JWT_SECRET_KEY }} \
              -e SIEGE_CORS_ORIGINS='["https://${{ secrets.DROPLET_IP }}","https://siege.strutco.io"]' \
              -e SIEGE_DATABASE_URL=sqlite:////data/siege_engine.db \
              -e SIEGE_GIT_REPOS_BASE_PATH=/data/repos \
              siege-engine:latest
            docker image prune -f
            rm -rf /tmp/siege-deploy
