name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/siege-engine

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: siege-engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop siege-engine || true
            docker rm siege-engine || true
            docker run -d \
              --name siege-engine \
              --restart=unless-stopped \
              -p 80:8000 \
              -p 443:8000 \
              -v siege_data:/data \
              -e SIEGE_ANTHROPIC_API_KEY=${{ secrets.SIEGE_ANTHROPIC_API_KEY }} \
              -e SIEGE_JWT_SECRET_KEY=${{ secrets.SIEGE_JWT_SECRET_KEY }} \
              -e SIEGE_CORS_ORIGINS='["https://${{ secrets.DROPLET_IP }}"]' \
              -e SIEGE_DATABASE_URL=sqlite:////data/siege_engine.db \
              -e SIEGE_GIT_REPOS_BASE_PATH=/data/repos \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker image prune -f
